name: Sync main → develop

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create sync PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --base develop --head main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "Sync PR #$EXISTING_PR already exists, skipping"
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "chore(root): sync main → develop" \
            --body "Automated sync of release artifacts from main into develop."
